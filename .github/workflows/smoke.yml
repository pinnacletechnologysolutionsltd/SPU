name: Tang-25k Smoke
on: [push, pull_request]

jobs:
  phinary:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    - name: Run phinary VM test
      run: python3 -B software/tools/phinary_vm_test.py
