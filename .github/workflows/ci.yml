name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    name: Regression (iverilog + C++ + Python VM)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq iverilog g++ verilator
      - name: Run full regression
        run: python3 run_all_tests.py

  papers:
    name: Build paper PDFs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-latex-extra texlive-fonts-recommended \
            texlive-publishers texlive-science latexmk
      - name: Build papers
        run: |
          mkdir -p build/papers
          # central + lucas + su3 compile from docs/; rplu must compile from repo root
          for p in spu13_central_paper LUCAS_MAC_PAPER SU3_COPROCESSOR_PAPER; do
            (cd docs && latexmk -pdf -interaction=nonstopmode "$p.tex")
            mv "docs/$p.pdf" build/papers/
          done
          latexmk -pdf -interaction=nonstopmode -output-directory=build/papers docs/rplu_paper.tex
      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdfs
          path: build/papers/*.pdf
